  <style>
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      text-align: center;
      background: #f5f7fb;
    }

    /* container */
    #tree-container {
      position: relative;
      display: inline-block;
      padding: 20px;
    }

    /* NODE CARD */
    .node {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      /* 👇 ADD THESE */
      flex: 0 0 auto;
      /* prevent shrinking */
      width: auto;
      /* fit content */
      white-space: nowrap;
      /* keep text in one line */

      padding: 8px 14px;
      border-radius: 10px;
      margin: 12px;

      background: #ffffff;
      border: 1px solid #e0e0e0;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);

      display: inline-flex;
      align-items: center;
      gap: 8px;

      flex: 0 0 auto;
      /* important */
      white-space: nowrap;

      /* 👇 ADD THIS */
      min-width: max-content;
      /* lock width to content */
    }

    /* hover effect */
    .node:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
    }

    /* NAME TEXT */
    .node span:last-child {
      font-weight: 500;
      color: #333;
    }

    /* TOGGLE BUTTON */
    .toggle {
      width: 18px;
      height: 18px;
      line-height: 16px;
      text-align: center;

      border-radius: 50%;
      border: none;

      background: #4a90e2;
      color: white;

      font-size: 13px;
      font-weight: bold;

      cursor: pointer;
      user-select: none;

      transition: all 0.2s ease;
    }

    /* toggle hover */
    .toggle:hover {
      background: #357abd;
      transform: scale(1.1);
    }

    /* CHILDREN LAYOUT */
    .children {
      display: flex;
      justify-content: center;
      align-items: flex-start;

      gap: 60px;
      margin-top: 40px;

      /* 👇 ADD THIS */
      flex-wrap: nowrap;
      /* prevent reflow */
    }

    /* hidden */
    .hidden {
      display: none;
    }

    /* SVG lines */
    svg {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    line {
      stroke: #b0b8c1;
      stroke-width: 2;
    }
  </style>

    /* =========================
       2. RENDER TREE
       ========================= */

    function createNode(person) {
      const wrapper = document.createElement("div");

      const node = document.createElement("div");
      node.className = "node";

      const hasChildren = person.children && person.children.length > 0;

      let toggle;

      if (hasChildren) {
        toggle = document.createElement("div");
        toggle.className = "toggle";
        toggle.textContent = "+";
        node.appendChild(toggle);
      } else {
        const spacer = document.createElement("div");
        spacer.style.width = "16px";
        node.appendChild(spacer);
      }

      const name = document.createElement("span");
      name.textContent = person.name;
      node.appendChild(name);

      wrapper.appendChild(node);

      if (hasChildren) {
        const childrenDiv = document.createElement("div");
        childrenDiv.className = "children hidden";

        person.children.forEach(child => {
          childrenDiv.appendChild(createNode(child));
        });

        function handleToggle(e) {
          e.stopPropagation();

          const isHidden = childrenDiv.classList.toggle("hidden");
          toggle.textContent = isHidden ? "+" : "–";

          setTimeout(drawLines, 0);

          requestAnimationFrame(drawLines);
        }

        // click on icon
        toggle.onclick = handleToggle;

        // 👇 click on whole card
        node.onclick = handleToggle;

        wrapper.appendChild(childrenDiv);
      }

      return wrapper;
    }

    document.getElementById("tree").appendChild(createNode(familyTree));


    /* =========================
       3. DRAW SVG LINES
       ========================= */

    function drawLines() {
      const svg = document.getElementById("lines");
      svg.innerHTML = "";

      const container = document.getElementById("tree-container");
      const rect = container.getBoundingClientRect();

      svg.setAttribute("width", rect.width);
      svg.setAttribute("height", rect.height);

      const nodes = document.querySelectorAll(".node");

      nodes.forEach(node => {
        const parent = node.parentElement;
        const childrenDiv = parent.querySelector(":scope > .children");

        if (childrenDiv && !childrenDiv.classList.contains("hidden")) {
          const parentRect = node.getBoundingClientRect();

          const px = parentRect.left + parentRect.width / 2 - rect.left;
          const py = parentRect.bottom - rect.top;

          const childNodes = [];

          childrenDiv.childNodes.forEach(childWrapper => {
            const childNode = childWrapper.querySelector(".node");
            if (childNode) childNodes.push(childNode);
          });

          if (childNodes.length === 0) return;

          const firstChildRect = childNodes[0].getBoundingClientRect();
          const midY = (py + (firstChildRect.top - rect.top)) / 2;

          // vertical down from parent
          drawLine(px, py, px, midY);

          // horizontal line across children
          const xs = childNodes.map(c => {
            const r = c.getBoundingClientRect();
            return r.left + r.width / 2 - rect.left;
          });

          const leftX = Math.min(...xs);
          const rightX = Math.max(...xs);

          drawLine(leftX, midY, rightX, midY);

          // vertical lines to each child
          childNodes.forEach(childNode => {
            const cr = childNode.getBoundingClientRect();

            const cx = cr.left + cr.width / 2 - rect.left;
            const cy = cr.top - rect.top;

            drawLine(cx, midY, cx, cy);
          });
        }
      });
    }

    function drawLine(x1, y1, x2, y2) {
      const svg = document.getElementById("lines");

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

      line.setAttribute("x1", x1);
      line.setAttribute("y1", y1);
      line.setAttribute("x2", x2);
      line.setAttribute("y2", y2);

      svg.appendChild(line);
    }
